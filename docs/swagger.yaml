basePath: /api/v1
definitions:
  dto.UserResponse:
    properties:
      bio:
        type: string
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      image:
        type: string
      updated_at:
        type: string
      username:
        type: string
    type: object
  response.Envelope:
    properties:
      data: {}
      error:
        $ref: '#/definitions/response.ErrorData'
      meta:
        $ref: '#/definitions/response.MetaData'
      success:
        type: boolean
    type: object
  response.ErrorData:
    properties:
      code:
        type: string
      message:
        type: string
    type: object
  response.MetaData:
    properties:
      page:
        type: integer
      page_size:
        type: integer
      total_items:
        type: integer
      total_pages:
        type: integer
    type: object
host: localhost:3001
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: This is a sample server for San application.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: San API
  version: "1.0"
paths:
  /users:
    get:
      consumes:
      - application/json
      description: Get a list of all users with pagination
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Page size (default 10)
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Envelope'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/dto.UserResponse'
                  type: array
                meta:
                  $ref: '#/definitions/response.MetaData'
              type: object
        "500":
          description: Internal Server Error
          schema:
            allOf:
            - $ref: '#/definitions/response.Envelope'
            - properties:
                error:
                  $ref: '#/definitions/response.ErrorData'
              type: object
      summary: List all users
      tags:
      - users
    post:
      consumes:
      - application/json
      - multipart/form-data
      description: Create a new user with optional avatar
      parameters:
      - description: Username
        in: formData
        name: username
        required: true
        type: string
      - description: Email
        in: formData
        name: email
        required: true
        type: string
      - description: Password
        in: formData
        name: password
        required: true
        type: string
      - description: Bio
        in: formData
        name: bio
        type: string
      - description: Avatar Image
        in: formData
        name: avatar
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.UserResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a new user
      tags:
      - users
  /users/{id}:
    delete:
      consumes:
      - application/json
      description: Delete a user by ID
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Envelope'
        "404":
          description: Not Found
          schema:
            allOf:
            - $ref: '#/definitions/response.Envelope'
            - properties:
                error:
                  $ref: '#/definitions/response.ErrorData'
              type: object
        "500":
          description: Internal Server Error
          schema:
            allOf:
            - $ref: '#/definitions/response.Envelope'
            - properties:
                error:
                  $ref: '#/definitions/response.ErrorData'
              type: object
      summary: Delete a user
      tags:
      - users
    get:
      consumes:
      - application/json
      description: Get details of a specific user
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Envelope'
            - properties:
                data:
                  $ref: '#/definitions/dto.UserResponse'
              type: object
        "404":
          description: Not Found
          schema:
            allOf:
            - $ref: '#/definitions/response.Envelope'
            - properties:
                error:
                  $ref: '#/definitions/response.ErrorData'
              type: object
      summary: Get a user by ID
      tags:
      - users
    put:
      consumes:
      - application/json
      description: Update user details
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      - description: Username
        in: body
        name: username
        schema:
          type: string
      - description: Email
        in: body
        name: email
        schema:
          type: string
      - description: Bio
        in: body
        name: bio
        schema:
          type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Envelope'
            - properties:
                data:
                  $ref: '#/definitions/dto.UserResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            allOf:
            - $ref: '#/definitions/response.Envelope'
            - properties:
                error:
                  $ref: '#/definitions/response.ErrorData'
              type: object
        "404":
          description: Not Found
          schema:
            allOf:
            - $ref: '#/definitions/response.Envelope'
            - properties:
                error:
                  $ref: '#/definitions/response.ErrorData'
              type: object
        "500":
          description: Internal Server Error
          schema:
            allOf:
            - $ref: '#/definitions/response.Envelope'
            - properties:
                error:
                  $ref: '#/definitions/response.ErrorData'
              type: object
      summary: Update a user
      tags:
      - users
  /users/{id}/avatar:
    post:
      consumes:
      - multipart/form-data
      description: Upload an avatar image for a user
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      - description: Avatar Image
        in: formData
        name: avatar
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Envelope'
            - properties:
                data:
                  $ref: '#/definitions/dto.UserResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            allOf:
            - $ref: '#/definitions/response.Envelope'
            - properties:
                error:
                  $ref: '#/definitions/response.ErrorData'
              type: object
        "500":
          description: Internal Server Error
          schema:
            allOf:
            - $ref: '#/definitions/response.Envelope'
            - properties:
                error:
                  $ref: '#/definitions/response.ErrorData'
              type: object
      summary: Upload user avatar
      tags:
      - users
securityDefinitions:
  BasicAuth:
    type: basic
swagger: "2.0"
